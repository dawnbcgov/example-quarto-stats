title: bcds
author: Robert Johnstone
version: 1.0.0
quarto-required: ">=1.6.0"
contributes:
  shortcodes:
    - bcds.lua
  project:
    project:
      output-dir: _site
      type: website
      resources:
        - "assets"
    format: bcds-html
    website:
      resources:
        - "*.html"
        - "*.pdf"
      title: "Air quality warnings"
      navbar:
        right:
          - text: Historical warnings
            href: warnings.qmd
          - text: Statistics
            href: statistics.qmd
      sidebar:
        style: "docked"
        alignment: left
        border: false
        collapse-level: 3
        contents:
          - text: Example
            href: index.qmd                
  formats:
    html:
      toc: true
      include-before-body:
        text: |
          <script>
            function BCDSCollapseAll() {
              const elements = document.getElementsByClassName('bcds-disclosure');
              for (let i=0; i<elements.length; i++) {
                elements.item(i).removeAttribute('open');
              }
            }
            function BCDSExpandAll() {
              const elements = document.getElementsByClassName('bcds-disclosure');
              for (let i=0; i<elements.length; i++) {
                elements.item(i).setAttribute('open', true);
              }
            }
          </script>
      theme:
        - minimal
        - variables.scss
        - bcds.scss
        - bcds-footer.scss
        - bcds-callouts.scss
        - bcds-inline-alert.scss
        - bcds-cards.scss
        - bcds-accordion.scss
      template-partials:
        - partials/title-block.html